# nautilius/jobs/train-resenc-prototype-5fold-met2026.yaml
#
# Train nnUNet ResEnc M + PrototypeFusionBlock3D on Dataset002_BraTS2026_MET
# using 5-fold cross-validation, all folds running in parallel.
#
# Same nnUNetTrainerPrototype class as the standard variant — the ResEnc
# architecture comes from the nnUNetResEncUNetMPlans plans file (-p flag).
#
# Labels: 0=background, 1=NETC, 2=SNFH, 3=ET, 4=RC
#
# Prerequisites:
#   - prepare-dataset-met2026 job completed (nnUNetResEncUNetMPlans available)
#   - Docker image built with scripts/nnunet_trainer_prototype.py
#
# Outputs (per fold):
#   /pvc/nnunet/results/Dataset002_BraTS2026_MET/
#     nnUNetTrainerPrototype__nnUNetResEncUNetMPlans__3d_fullres/
#       fold_{N}/checkpoint_best.pth
#       fold_{N}/checkpoint_best_prototype.pth
#
# Deploy : kubectl apply  -f nautilius/jobs/train-resenc-prototype-5fold-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/resenc-proto-met2026-fold0 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/train-resenc-prototype-5fold-met2026.yaml -n gai-lina-group

# ── Fold 0 ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: resenc-proto-met2026-fold0
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              VARIANTS=$(python -c "import nnunetv2, os; print(os.path.join(os.path.dirname(nnunetv2.__file__), 'training', 'nnUNetTrainer', 'variants'))")
              cp /workspace/nnunet_trainer_prototype.py $VARIANTS/
              nnUNetv2_train 002 3d_fullres 0 \
                -tr nnUNetTrainerPrototype \
                -p nnUNetResEncUNetMPlans \
                --npz
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: nnUNet_compile
              value: "false"
          resources:
            requests:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/a100: "1"
            limits:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/a100: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
---
