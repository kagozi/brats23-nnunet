apiVersion: batch/v1
kind: Job
metadata:
  name: train-nnunet-brats23
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          command:
            - bash
            - -c
            - |
              set -e
              nnUNetv2_train 001 3d_fullres ${FOLD}
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: FOLD
              value: "0"
          resources:
            requests:
              cpu: "6"
              memory: "20Gi"
            limits:
              cpu: "7"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-A100-SXM4-80GB
                      - NVIDIA-A100-80GB-PCIe
