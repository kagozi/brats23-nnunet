# nautilius/jobs/train-resenc-5fold-met2026.yaml
#
# Train nnUNet Residual Encoder M (nnUNetResEncUNetMPlans) on Dataset002_BraTS2026_MET
# using 5-fold cross-validation, all folds running in parallel.
#
# Labels: 0=background, 1=NETC, 2=SNFH, 3=ET, 4=RC
#
# Prerequisites:
#   - prepare-dataset-met2026 job completed successfully
#     (runs nnUNetv2_plan_experiment -pl nnUNetPlannerResEncM, generating
#      /pvc/nnunet/preprocessed/Dataset002_BraTS2026_MET/nnUNetResEncUNetMPlans.json)
#
# Outputs (per fold):
#   /pvc/nnunet/results/Dataset002_BraTS2026_MET/
#     nnUNetTrainer__nnUNetResEncUNetMPlans__3d_fullres/
#       fold_{N}/checkpoint_best.pth
#       fold_{N}/checkpoint_final.pth
#
# Deploy : kubectl apply  -f nautilius/jobs/train-resenc-5fold-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/resenc-met2026-fold0 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/train-resenc-5fold-met2026.yaml -n gai-lina-group

# ── Fold 0 ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: resenc-met2026-fold0
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              nnUNetv2_train 002 3d_fullres 0 \
                -p nnUNetResEncUNetMPlans \
                --npz
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/gpu: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-A100-SXM4-80GB
                      - NVIDIA-A100-80GB-PCIe
---
