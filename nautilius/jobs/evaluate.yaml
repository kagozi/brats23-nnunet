apiVersion: batch/v1
kind: Job
metadata:
  name: nnunet-evaluate-brats23
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
      containers:
        - name: evaluator
          image: ghcr.io/kagozi/brats23-cwdm:latest
          command:
            - bash
            - -c
            - |
              set -e
              python /workspace/evaluate.py \
                --pred_dir /pvc/nnunet/predictions/${DATA_SPLIT}/dataset${MODEL_DATASET} \
                --gt_dir /pvc/brats23/${DATA_SPLIT} \
                --output_dir /pvc/nnunet/eval/${DATA_SPLIT}/dataset${MODEL_DATASET} \
                --pred_ncr_label 2 \
                --pred_et_label 3
          env:
            - name: DATA_SPLIT
              value: "test"
            - name: MODEL_DATASET
              value: "137"
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
