# nautilius/jobs/prepare-dataset-met2026.yaml
#
# Plan and preprocess Dataset002_BraTS2026_MET for nnUNet training.
# Raw data and label fixes are already in place on the PVC.
#
# Deploy : kubectl apply  -f nautilius/jobs/prepare-dataset-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/prepare-dataset-met2026 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/prepare-dataset-met2026.yaml -n gai-lina-group

apiVersion: batch/v1
kind: Job
metadata:
  name: prepare-dataset-met2026
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
      containers:
        - name: preparer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              echo "=== Step 2: Default plan + preprocess ==="
              nnUNetv2_plan_and_preprocess \
                -d 002 \
                -np 8 \
                -npfp 8

              echo ""
              echo "=== Step 3: ResEnc M plans (reuses preprocessed data) ==="
              nnUNetv2_plan_experiment \
                -d 002 \
                -pl nnUNetPlannerResEncM

              echo ""
              echo "=== Done. Dataset002_BraTS2026_MET is ready for training. ==="
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              ephemeral-storage: "20Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
