# nautilius/jobs/prepare-dataset-met2026.yaml
#
# Extract BraTS 2026 MET zip files from the PVC, clean labels, and build
# the nnUNet Dataset002_BraTS2026_MET directory structure.
# Finishes with nnUNetv2_plan_and_preprocess.
#
# Prerequisites:
#   - Zip files already on PVC at /pvc/data/brats2026-met/zips/ (see upload-pod.yaml)
#   - Docker image contains prepare_dataset_met2026.py at /workspace/prepare_dataset_met2026.py
#
# Deploy : kubectl apply  -f nautilius/jobs/prepare-dataset-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/prepare-dataset-met2026 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/prepare-dataset-met2026.yaml -n gai-lina-group

apiVersion: batch/v1
kind: Job
metadata:
  name: prepare-dataset-met2026
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
      containers:
        - name: preparer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              echo "=== Step 1: Extract + clean labels ==="
              python /workspace/prepare_dataset_met2026.py \
                --zip_dir /pvc/data/brats2026-met/zips \
                --raw_dir /pvc/data/brats2026-met \
                --nnunet_raw /pvc/nnunet/raw

              echo ""
              echo "=== Step 2: Default plan + preprocess ==="
              nnUNetv2_plan_and_preprocess \
                -d 002 \
                --verify_dataset_integrity \
                -np 8 \
                -npfp 8

              echo ""
              echo "=== Step 3: ResEnc M plans (reuses preprocessed data) ==="
              nnUNetv2_plan_experiment \
                -d 002 \
                -pl nnUNetPlannerResEncM

              echo ""
              echo "=== Done. Dataset002_BraTS2026_MET is ready for training. ==="
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              ephemeral-storage: "20Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
