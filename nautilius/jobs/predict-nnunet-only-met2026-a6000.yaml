# nautilius/jobs/predict-nnunet-only-met2026-a6000.yaml
#
# Same pipeline as predict-nnunet-only-met2026.yaml but targets RTX A6000 (48 GB)
# nodes instead of A100. Run in parallel with the A100 job — delete whichever
# one loses the race once the other schedules.
#
# Deploy : kubectl apply  -f nautilius/jobs/predict-nnunet-only-met2026-a6000.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/predict-nnunet-only-met2026-a6000 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/predict-nnunet-only-met2026-a6000.yaml -n gai-lina-group

apiVersion: batch/v1
kind: Job
metadata:
  name: predict-nnunet-only-met2026-a6000
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: predictor
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              VAL_DIR=/pvc/nnunet/raw/Dataset002_BraTS2026_MET/imagesVal
              PRED_BASE=/pvc/nnunet/predictions/met2026
              mkdir -p $PRED_BASE

              echo "=== 1/3  nnUNet 5-fold predict ==="
              nnUNetv2_predict \
                -i  $VAL_DIR \
                -o  $PRED_BASE/nnunet \
                -d  002 \
                -c  3d_fullres \
                -f  0 1 2 3 4 \
                --save_probabilities \
                -npp 2 -nps 2

              echo ""
              echo "=== 2/3  Post-process (zero RC for pre-treatment cases) ==="
              python /workspace/postprocess_met2026.py \
                --pred_dir $PRED_BASE/nnunet \
                --out_dir  $PRED_BASE/final

              echo ""
              echo "=== 3/3  Zip for Synapse submission ==="
              cd $PRED_BASE
              zip -j submission.zip final/*.nii.gz

              echo ""
              echo "=== Done. Submit $PRED_BASE/submission.zip to Synapse. ==="
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "6"
              memory: "40Gi"
              nvidia.com/rtxa6000: "1"
              ephemeral-storage: "0"
            limits:
              cpu: "6"
              memory: "40Gi"
              nvidia.com/rtxa6000: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
