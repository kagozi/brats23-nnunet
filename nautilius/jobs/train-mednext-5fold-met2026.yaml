# nautilius/jobs/train-mednext-5fold-met2026.yaml
#
# Train MedNeXt-L (kernel_size=3, do_res=True) on Dataset002_BraTS2026_MET
# using 5-fold cross-validation, all folds in parallel.
#
# Requires ≥40 GB VRAM (A100 / A6000).  Uses nvidia.com/gpu (generic) with a
# node-affinity filter so it schedules on any ≥40 GB node and avoids the A100
# quota bottleneck.
#
# Each job copies MedNextTrainerL.py into the nnunetv2 trainer variants dir
# at startup, so it works with the current image without a rebuild.
#
# Deploy : kubectl apply -f nautilius/jobs/train-mednext-5fold-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/mednext-met2026-fold0 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/train-mednext-5fold-met2026.yaml -n gai-lina-group

# ── Fold 0 ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: mednext-met2026-fold0
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              cp /workspace/MedNextTrainerL.py \
                /opt/conda/lib/python3.10/site-packages/nnunetv2/training/nnUNetTrainer/variants/network_architecture/MedNextTrainerL.py
              nnUNetv2_train 002 3d_fullres 0 \
                -tr MedNextTrainerL \
                --npz
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: nnUNet_compile
              value: "false"
          resources:
            requests:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/gpu: "1"
              ephemeral-storage: "0"
            limits:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/gpu: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.memory
                    operator: Gt
                    values:
                      - "39000"
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
---
