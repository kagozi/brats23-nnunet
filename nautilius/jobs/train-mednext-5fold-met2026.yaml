# nautilius/jobs/train-mednext-5fold-met2026.yaml
#
# Train MedNeXt-M (kernel size 3, 17.6M params) on Dataset002_BraTS2026_MET
# using 5-fold cross-validation, all folds running in parallel.
#
# MedNeXt-M uses ConvNeXt-style blocks in encoder and decoder.
# It reuses the default nnUNetPlans preprocessing from the prepare job.
# Trainer: MedNeXtTrainerM_kernel3 (registered in nnUNetv2 via mednext package)
#
# Labels: 0=background, 1=NETC, 2=SNFH, 3=ET, 4=RC
#
# Prerequisites:
#   - prepare-dataset-met2026 job completed (default nnUNetPlans available)
#   - Docker image built with mednext in requirements.txt
#
# Outputs (per fold):
#   /pvc/nnunet/results/Dataset002_BraTS2026_MET/
#     MedNeXtTrainerM_kernel3__nnUNetPlans__3d_fullres/
#       fold_{N}/checkpoint_best.pth
#       fold_{N}/checkpoint_final.pth
#
# Deploy : kubectl apply  -f nautilius/jobs/train-mednext-5fold-met2026.yaml -n gai-lina-group
# Monitor: kubectl logs -f job/mednext-met2026-fold0 -n gai-lina-group
# Delete : kubectl delete -f nautilius/jobs/train-mednext-5fold-met2026.yaml -n gai-lina-group

# ── Fold 0 ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: mednext-met2026-fold0
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: trainer
          image: ghcr.io/kagozi/brats23-nnunet:latest
          imagePullPolicy: Always
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              nnUNetv2_train 002 3d_fullres 0 \
                -tr MedNeXtTrainerM_kernel3 \
                --npz
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: nnUNet_compile
              value: "false"
          resources:
            requests:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/a100: "1"
            limits:
              cpu: "8"
              memory: "40Gi"
              nvidia.com/a100: "1"
              ephemeral-storage: "50Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
---
