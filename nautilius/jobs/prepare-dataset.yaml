apiVersion: batch/v1
kind: Job
metadata:
  name: prepare-brats23-nnunet
  namespace: gai-lina-group
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: pvc
          persistentVolumeClaim:
            claimName: brats23-pvc
      containers:
        - name: preparer
          image: ghcr.io/kagozi/brats23-cwdm:latest
          command:
            - bash
            - -c
            - |
              set -e
              python /workspace/prepare_dataset.py \
                --input_dir /pvc/brats23 \
                --nnunet_raw /pvc/nnunet/raw
              nnUNetv2_plan_and_preprocess -d 001 --verify_dataset_integrity
          env:
            - name: nnUNet_raw
              value: /pvc/nnunet/raw
            - name: nnUNet_preprocessed
              value: /pvc/nnunet/preprocessed
            - name: nnUNet_results
              value: /pvc/nnunet/results
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - name: pvc
              mountPath: /pvc
